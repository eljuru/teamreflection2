async function saveScoresToDB(teamCode, name, scores) {
  const flat = flattenScores(scores);
  const {error} = await supabase.from("profiles").insert({team_code: teamCode, name: name || "Anonym", scores: flat});
  if (error) console.error("Supabase insert error:", error);
  return !error;
}

// Normalize legacy score keys to current format
function normalizeScoreKeys(scores) {
  if (!scores) return scores;
  const KEY_MAP = {
    ta_TR:"TA_Vertrauen", ta_FC:"TA_Konfliktbereitschaft", ta_CO:"TA_Verbindlichkeit",
    ta_AC:"TA_Verantwortlichkeit", ta_RE:"TA_Ergebnisorientierung",
    ps_total:"PS_Gesamt",
    fos_UT:"FOS_Nützlichkeit", fos_AC:"FOS_Verantwortlichkeit",
    fos_SA:"FOS_Soziale Aufmerksamkeit", fos_SE:"FOS_Selbstwirksamkeit",
  };
  const out = {};
  for (const [k, v] of Object.entries(scores)) {
    out[KEY_MAP[k] || k] = v;
  }
  return out;
}

async function loadTeamProfiles(teamCode) {
  const {data, error} = await supabase.from("profiles").select("*").eq("team_code", teamCode).order("created_at", {ascending: true});
  if (error) { console.error("Supabase select error:", error); return []; }
  return data.map(row => ({name: row.name, scores: normalizeScoreKeys(row.scores), id: row.id, created_at: row.created_at}));
}

// ══ HELPER FUNCTIONS ══
function pct(mean, scaleMin, scaleMax) {
  if (scaleMax === scaleMin) return 0;
  return Math.round(((mean - scaleMin) / (scaleMax - scaleMin)) * 100);
}
function meanOf(vals) { return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0; }

function computeScores(ans) {
  // Team Assessment (raw sum + pct)
  const ta = {};
  for (const [d,{label}] of Object.entries(TA_DIMS)) {
    const dimItems = TA_ITEMS.filter(i=>i.d===d);
    const vals = dimItems.map(i=>ans[i.id]).filter(v=>v!==undefined);
    if (vals.length) {
      const rawSum = vals.reduce((a,b)=>a+b,0);
      const n = dimItems.length;
      ta[label] = {rawSum, pct: pct(rawSum, n * 1, n * 3)};
    } else {
      ta[label] = {rawSum: 0, pct: 0};
    }
  }

  // Psychologische Sicherheit (single percentage)
  const psVals = PS_ITEMS.map(i=>{const r=ans[i.id]; return r!==undefined?(i.r?8-r:r):null;}).filter(v=>v!==null);
  const ps = psVals.length ? pct(meanOf(psVals), 1, 7) : 0;

  // Feedbackorientierung (percentage per subscale)
  const fos = {};
  for (const [s,{label}] of Object.entries(FOS_DIMS)) {
    const vals = FOS_ITEMS.filter(i=>i.s===s).map(i=>ans[i.id]).filter(v=>v!==undefined);
    fos[label] = vals.length ? pct(meanOf(vals), 1, 5) : 0;
  }

  // AG-Leitung Feedback (percentage per item + mean)
  const agl = {};
  for (const item of AGL_ITEMS) {
    const v = ans[item.id];
    agl[item.q] = v !== undefined ? pct(v, 1, 7) : 0;
  }
  const aglVals = AGL_ITEMS.map(i=>ans[i.id]).filter(v=>v!==undefined);
  const aglMean = aglVals.length ? pct(meanOf(aglVals), 1, 7) : 0;

  // Open-ended answers
  const aglOpen = {};
  for (const item of AGL_OPEN) {
    aglOpen[item.q] = ans[item.id] || "";
  }

  // Raw item answers for CSV export
  const items = {};
  TA_ITEMS.forEach(i => { items[i.id] = ans[i.id] !== undefined ? ans[i.id] : ""; });
  PS_ITEMS.forEach(i => { items[i.id] = ans[i.id] !== undefined ? ans[i.id] : ""; });
  FOS_ITEMS.forEach(i => { items[i.id] = ans[i.id] !== undefined ? ans[i.id] : ""; });
  AGL_ITEMS.forEach(i => { items[i.id] = ans[i.id] !== undefined ? ans[i.id] : ""; });

  return {ta, ps, fos, agl, aglMean, aglOpen, items};
}

    return "Ihr Team verfügt über ein starkes Vertrauensfundament. Teammitglieder fühlen sich sicher, Schwächen zuzugeben, um Hilfe zu bitten und sich verletzlich zu zeigen.";
  }
  if (dim === "Konfliktbereitschaft") {
    if (pct < 34) return "Das Team scheut produktive Konflikte. Wichtige Themen werden vermieden, Meetings sind wenig engagiert, und es herrscht eine künstliche Harmonie. Das Team sollte lernen, dass leidenschaftliche Debatten über Ideen wertvoll sind.";
    if (pct < 67) return "Es gibt teilweise offene Diskussionen, aber schwierige Themen werden noch nicht konsequent angesprochen. Hier gibt es Potenzial für mehr konstruktive Auseinandersetzung.";
    return "Ihr Team pflegt eine Kultur produktiver Konflikte. Wichtige Themen werden offen angesprochen, und Meetings sind lebendig und engagiert.";
  }
  if (dim === "Verbindlichkeit") {
    if (pct < 34) return "Teammitglieder tragen Entscheidungen nicht vollständig mit. Es fehlt an Klarheit über Prioritäten und Handlungsschritte. Mehrdeutigkeit und fehlendes Buy-in führen zu Verzögerungen.";
    if (pct < 67) return "Entscheidungen werden grundsätzlich mitgetragen, aber es gibt noch Unsicherheiten bei der Umsetzung. Klarere Beschlüsse und explizites Commitment könnten helfen.";
    return "Ihr Team zeichnet sich durch hohe Verbindlichkeit aus. Entscheidungen werden klar getroffen, von allen getragen und konsequent umgesetzt.";
  }
  if (dim === "Verantwortlichkeit") {
    if (pct < 34) return "Teammitglieder sprechen sich gegenseitig nicht auf unproduktives Verhalten an. Es fehlt an gegenseitiger Rechenschaftspflicht, was zu sinkenden Standards führt.";
    if (pct < 67) return "Es gibt ansatzweise gegenseitige Verantwortlichkeit, aber Teammitglieder zögern noch, einander direkt auf Probleme anzusprechen.";
    return "Ihr Team lebt eine starke Kultur gegenseitiger Verantwortlichkeit. Teammitglieder sprechen Probleme direkt an und halten sich gegenseitig an hohen Standards.";
  }
  if (dim === "Ergebnisorientierung") {
    if (pct < 34) return "Das Team verliert leicht den Fokus auf gemeinsame Ergebnisse. Individuelle Ziele, Status oder Ego stehen über dem Teamerfolg.";
    if (pct < 67) return "Das Team hat grundsätzlich den Blick auf Ergebnisse, aber individuelle Interessen können manchmal überwiegen.";
    return "Ihr Team ist stark ergebnisorientiert. Der gemeinsame Erfolg steht über individuellen Interessen und Statusdenken.";
  }
  return "";
}

function getPSInterpretation(pct) {
  if (pct < 34) return "Die psychologische Sicherheit in Ihrem Team ist gering. Teammitglieder befürchten negative Konsequenzen, wenn sie Risiken eingehen, Fehler zugeben oder abweichende Meinungen äußern. Dies hemmt Innovation und offene Kommunikation erheblich.";
  if (pct < 67) return "Die psychologische Sicherheit ist teilweise vorhanden, aber nicht stabil. In manchen Situationen fühlen sich Teammitglieder sicher, in anderen nicht. Gezielte Maßnahmen zur Stärkung des Vertrauens und der Offenheit könnten helfen.";
  return "Ihr Team verfügt über hohe psychologische Sicherheit. Teammitglieder fühlen sich sicher, Risiken einzugehen, Fehler zuzugeben und ihre Meinung offen zu äußern. Dies ist eine exzellente Grundlage für Innovation und Lernen.";
}

function getFOSInterpretation(dim, pct) {
  if (dim === "Nützlichkeit") {
    if (pct < 34) return "Sie sehen Feedback als wenig hilfreich für Ihre Entwicklung. Dies könnte Sie von wertvollen Lernmöglichkeiten abschneiden.";
    if (pct < 67) return "Sie erkennen den Wert von Feedback, könnten es aber konsequenter für Ihre Entwicklung nutzen.";
    return "Sie schätzen Feedback als wichtiges Werkzeug für Ihre Entwicklung. Dies fördert kontinuierliches Lernen.";
  }
  if (dim === "Verantwortlichkeit") {
    if (pct < 34) return "Sie sehen es nicht als Ihre Verantwortung an, Feedback umzusetzen. Dies kann zu Stagnation führen.";
    if (pct < 67) return "Sie nehmen Feedback teilweise ernst, könnten aber konsequenter an der Umsetzung arbeiten.";
    return "Sie übernehmen volle Verantwortung für die Umsetzung von Feedback. Dies ist wertvoll für Ihre Glaubwürdigkeit.";
  }

    if (pct < 34) return "Sie nehmen wenig wahr, wie Ihr Verhalten auf andere wirkt. Dies könnte zu Missverständnissen führen.";
    if (pct < 67) return "Sie sind aufmerksam für Ihre Wirkung auf andere, könnten aber noch feinfühliger werden.";
    return "Sie sind sehr aufmerksam dafür, wie Ihr Verhalten andere beeinflusst. Dies hilft bei beziehungsorientierter Zusammenarbeit.";
  }
  if (dim === "Selbstwirksamkeit") {
    if (pct < 34) return "Sie fühlen sich im Umgang mit (kritischem) Feedback unsicher. Dies könnte Abwehrreaktionen fördern.";
    if (pct < 67) return "Sie können meist konstruktiv mit Feedback umgehen, reagieren aber manchmal defensiv.";
    return "Sie gehen sicher mit Feedback um und können es sachlich einordnen. Dies fördert eine Lernkultur.";
  }
  return "";
}

// ══ PDF GENERATION ══
function generatePDF(scores, name, date, setStatus) {
  try {
    setStatus("building");
    buildPDF(name||"Reflexionsprofil", date, scores);
    setStatus("done");
    setTimeout(()=>setStatus("idle"), 3500);
  } catch(err) {
    console.error(err);
    setStatus("error");
    setTimeout(()=>setStatus("idle"), 4000);
  }
}

function buildPDF(name, date, scores) {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const w = doc.internal.pageSize.getWidth();
  const h = doc.internal.pageSize.getHeight();
  let y = 15;

  const checkPage = (needed) => { if (y + (needed||20) > h - 15) { doc.addPage(); doc.setFillColor(11,19,33); doc.rect(0,0,w,h,"F"); y = 15; } };
  const addLine = ()=>{ checkPage(6); doc.setLineWidth(0.5); doc.setDrawColor("#1e3050"); doc.line(14, y, w-14, y); y += 4; };
  const addTitle = (text,size,color)=>{ checkPage(size); doc.setFontSize(size); doc.setTextColor(color||"#e8ddc8"); doc.text(text, 14, y); y += size/2.5; };
  const addText = (text,size,color)=>{ checkPage(10); doc.setFontSize(size); doc.setTextColor(color||"#6a7a8e"); const lines = doc.splitTextToSize(text, w-28); doc.text(lines, 14, y); y += lines.length * size * 0.4 + 2; };

  doc.setFillColor(11, 19, 33);
  doc.rect(0, 0, w, h, "F");

  addTitle("Team-Reflexion · Kommunikationsprofil", 20, "#c9921c");
  addText(`Profil: ${name}`, 10, "#e8ddc8");
  addText(`Erstellungsdatum: ${date}`, 9, "#6a7a8e");
  addLine();

  // Team Assessment
  addTitle("Instrument 1: Team Assessment", 14, "#4d8fd4");
  addText("5 Dimensionen der Teameffektivität", 9, "#6a7a8e");
  y += 4;
  for (const [dim, score] of Object.entries(scores.ta)) {
    const interpretation = getTAInterpretation(dim, score.pct);
    const maxRaw = TA_ITEMS.filter(i=>Object.entries(TA_DIMS).find(([k,v])=>v.label===dim)?.[0]===i.d).length * 3;
    addText(`${dim}: ${score.rawSum}/${maxRaw} (${score.pct}%)`, 10, score.pct < 34 ? "#d46a5a" : score.pct < 67 ? "#d4a03a" : "#4a9e72");
    addText(interpretation, 8, "#6a7a8e");
    y += 2;
  }
  addLine();

  // PS
  addTitle("Instrument 2: Psychologische Sicherheit", 14, "#3ab8c4");
  addText("Original · Frei verfügbar (Edmondson, 1999)", 9, "#6a7a8e");
  y += 4;
  const psInterpretation = getPSInterpretation(scores.ps);
  addText(`Gesamt: ${scores.ps}%`, 10, scores.ps < 34 ? "#d46a5a" : scores.ps < 67 ? "#d4a03a" : "#4a9e72");
  addText(psInterpretation, 8, "#6a7a8e");
  addLine();

  // FOS
  addTitle("Instrument 3: Feedbackorientierung", 14, "#7ab84a");
  addText("Konzeptuell inspiriert von Linderbaum & Levy (2010)", 9, "#6a7a8e");
  y += 4;
  for (const [dim, pct] of Object.entries(scores.fos)) {
    const interpretation = getFOSInterpretation(dim, pct);
    addText(`${dim}: ${pct}%`, 10, pct < 34 ? "#d46a5a" : pct < 67 ? "#d4a03a" : "#4a9e72");
    addText(interpretation, 8, "#6a7a8e");
    y += 2;
  }

  // AG-Leitung Feedback
  if (scores.agl) {
    addLine();
    addTitle("Instrument 4: AG-Leitung Feedback", 14, "#c4607a");
    addText("Hybrid: 4 Likert-Items + qualitative Rückmeldungen", 9, "#6a7a8e");
    y += 4;
    for (const [q, val] of Object.entries(scores.agl)) {
      addText(`${q}: ${val}%`, 10, val < 34 ? "#d46a5a" : val < 67 ? "#d4a03a" : "#4a9e72");
      y += 1;
    }
    addText(`Gesamtwert: ${scores.aglMean}%`, 10, "#e8ddc8");
    y += 4;
    if (scores.aglOpen) {
      addTitle("Qualitative Rückmeldungen", 11, "#c4607a");
      for (const [q, text] of Object.entries(scores.aglOpen)) {
        if (text) {
          addText(q, 9, "#e8ddc8");
          addText(text, 8, "#6a7a8e");
          y += 2;
        }
      }
    }
  }

  const pdfBlob = doc.output('blob');
  const pdfUrl = URL.createObjectURL(pdfBlob);
  const a = document.createElement("a");
  a.href = pdfUrl;
  a.download = `TeamReflexion_${(name||"Profil").replace(/\s+/g,"_")}.pdf`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(pdfUrl), 1000);
}

// ══ CSV EXPORT ══
function scoresToCSV(name, scores) {
  const rows = [["Kategorie","Dimension","Wert"]];
  for (const [dim,{pct}] of Object.entries(scores.ta)) rows.push(["Team Assessment",dim,pct]);
  rows.push(["Psychologische Sicherheit","Gesamt",scores.ps]);
  for (const [dim,val] of Object.entries(scores.fos)) rows.push(["Feedbackorientierung",dim,val]);
  if (scores.agl) {
    for (const [q,val] of Object.entries(scores.agl)) rows.push(["AG-Leitung (Likert)",q,val]);
    rows.push(["AG-Leitung (Likert)","Gesamt",scores.aglMean]);
  }
  if (scores.aglOpen) {
    for (const [q,text] of Object.entries(scores.aglOpen)) {
      if (text) rows.push(["AG-Leitung (Qualitativ)",q,text]);
    }
  }
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `Scores_${(name||"Profil").replace(/\s+/g,"_")}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ══ FLAT SCORES FOR SUPABASE ══
function flattenScores(scores) {
  const flat = {};
  // Individual items (raw responses)
  if (scores.items) {
    for (const [id, val] of Object.entries(scores.items)) {
      flat["Item_"+id] = val;
    }
  }
  // Scale scores
  for (const [dim,{pct}] of Object.entries(scores.ta)) flat["TA_"+dim] = pct;
  flat["PS_Gesamt"] = scores.ps;
  for (const [dim,val] of Object.entries(scores.fos)) flat["FOS_"+dim] = val;
  // AG-Leitung: Likert scores
  if (scores.agl) {
    AGL_ITEMS.forEach((item,i) => { flat["AGL_Item"+(i+1)] = scores.agl[item.q] || 0; });
    flat["AGL_Gesamt"] = scores.aglMean || 0;
  }
  // AG-Leitung: open-ended (stored as strings)
  if (scores.aglOpen) {
    AGL_OPEN.forEach((item,i) => { flat["AGL_Open"+(i+1)] = scores.aglOpen[item.q] || ""; });
  }
  return flat;
}

function parseCSV(text) {
  const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n").filter(l=>l.trim());
  if (lines.length < 2) return null;
  const rows = lines.slice(1).map(l => {
    const cells = [];
    let cur = "", inQ = false;
    for (let i = 0; i < l.length; i++) {
      const ch = l[i];
      if (ch === '"') { inQ = !inQ; continue; }
      if ((ch === ';' || ch === ',') && !inQ) { cells.push(cur.trim()); cur = ""; continue; }
      cur += ch;
    }
    cells.push(cur.trim());
    return cells;
  });
  const flat = {};
  for (const [cat,dim,val] of rows) {
    const key = cat.replace(/[.\s-]+/g,"_") + "_" + dim.replace(/[()–\s]+/g,"_").replace(/_+$/,"");
    flat[key] = parseFloat(val) || 0;
  }
  return flat;
}

      if (vals.some(v => typeof v === "string" && v !== "" && isNaN(Number(v)))) continue;
      const numVals = vals.map(v => typeof v === "string" ? Number(v) || 0 : (v || 0));
      const mean = numVals.reduce((a,b)=>a+b,0) / numVals.length;
      const sd = Math.sqrt(numVals.reduce((a,b)=>a+(b-mean)**2,0) / numVals.length);
      const min = Math.min(...numVals);
      const max = Math.max(...numVals);

        <div style={{display:"flex",gap:0,marginBottom:20,borderBottom:`2px solid ${C.border}`}}>
          {[{key:"quant",label:"Quantitative Ergebnisse"},{key:"text",label:"Offene Rückmeldungen"}].map(tab=>(
            <button key={tab.key} onClick={()=>setFacPage(tab.key)} style={{

            }}>{tab.label}</button>
          ))}
        </div>

        {/* PAGE 1: Quantitative Ergebnisse */}
        {facPage === "quant" && (<>
        {taRadar.length > 0 && (
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 14px",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <div style={{width:4,height:16,background:C.blue,borderRadius:2}}/>
              <h3 style={{fontFamily:"Georgia,serif",fontSize:14,fontWeight:700,color:C.cream,margin:0}}>Team Assessment — Radar (Mittelwerte)</h3>
            </div>
            <div style={{height:220}}>
              <ResponsiveContainer width="100%" height="100%">
                <RadarChart data={taRadar}>
                  <PolarGrid stroke={C.border}/>
                  <PolarAngleAxis dataKey="subject" tick={{fill:C.muted,fontSize:9}}/>
                  <PolarRadiusAxis domain={[0,100]} tick={{fill:C.faint}} tickCount={5}/>
                  <Radar dataKey="Mittelwert" fill={C.blue} fillOpacity={0.25} stroke={C.blue} strokeWidth={2} dot={{fill:C.blue,r:3}}/>
                </RadarChart>
              </ResponsiveContainer>
            </div>
          </div>
        )}


        {groups.map(g => {
          const cutoff = CUTOFFS[g.prefix];
          return (
          <div key={g.label} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 16px",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{width:4,height:18,background:g.color,borderRadius:2}}/>
              <h3 style={{fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,color:C.cream,margin:0}}>{g.label}</h3>
              <span style={{color:C.muted,fontSize:10,marginLeft:4}}>{g.dims.length} Dimension{g.dims.length!==1?"en":""}</span>
            </div>
            {cutoff && (
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10,marginLeft:12}}>
                <div style={{width:14,height:0,borderTop:`2px dashed ${C.coral}`}}/>
                <span style={{color:C.muted,fontSize:9}}>{cutoff.description}</span>
              </div>
            )}
            {g.dims.map(d => {
              const dimC = d.dimColor || g.color;
              const belowCutoff = cutoff && d.mean < cutoff.threshold;
              const highSD = d.sd > 15;
              return (
              <div key={d.key} style={{marginBottom:16,paddingBottom:12,borderBottom:`1px solid ${C.faint}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:dimC,flexShrink:0}}/>
                    <span style={{color:C.cream,fontSize:13,fontWeight:600}}>{d.dim}</span>
                    {belowCutoff && <span style={{background:C.coral+"22",color:C.coral,border:`1px solid ${C.coral}55`,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:700}}>⚠ Auffällig</span>}
                    {highSD && <span style={{background:C.amber+"22",color:C.amber,border:`1px solid ${C.amber}55`,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:700}}>↔ Heterogen</span>}
                  </div>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{color:C.muted,fontSize:10}}>SD {d.sd}</span>
                    <span style={{color:C.muted,fontSize:10}}>Min {d.min}</span>
                    <span style={{color:C.muted,fontSize:10}}>Max {d.max}</span>
                    <span style={{background:dimC+"33",color:dimC,border:`1px solid ${dimC}66`,borderRadius:20,padding:"2px 10px",fontSize:10,fontWeight:700}}>M = {d.mean}%</span>
                  </div>
                </div>
                <div style={{position:"relative",height:12,background:C.faint,borderRadius:6,overflow:"visible"}}>
                  {/* Range bar */}
                  <div style={{position:"absolute",left:`${d.min}%`,right:`${100-d.max}%`,height:"100%",background:dimC+"22",borderRadius:6}}/>
                  {/* Cut-off line */}
                  {cutoff && (
                    <div style={{position:"absolute",left:`${cutoff.threshold}%`,top:-4,width:0,height:20,borderLeft:`2px dashed ${C.coral}88`,transform:"translateX(-1px)",zIndex:2}}/>
                  )}
                  {/* Mean marker */}
                  <div style={{position:"absolute",left:`${d.mean}%`,top:-3,width:4,height:18,background:dimC,borderRadius:2,transform:"translateX(-2px)",zIndex:3}}/>
                  {/* Individual dots */}
                  {d.vals.map((v,i)=>(
                    <div key={i} style={{position:"absolute",left:`${v}%`,top:2,width:8,height:8,borderRadius:"50%",background:C.cream+"99",border:`1.5px solid ${dimC}`,transform:"translateX(-4px)",zIndex:1}}/>
                  ))}
                </div>
                {/* Scale labels */}
                <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
                  <span style={{color:C.muted,fontSize:8}}>0%</span>
                  <span style={{color:C.muted,fontSize:8}}>50%</span>
                  <span style={{color:C.muted,fontSize:8}}>100%</span>
                </div>
              </div>
            );})}
          </div>
        );})}

        {/* Legend */}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
          <div style={{color:C.cream,fontWeight:700,fontSize:11,marginBottom:8}}>Legende</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:16,fontSize:10,color:C.muted}}>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:C.cream+"99",border:`1.5px solid ${C.blue}`}}/>
              <span>Einzelperson</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:4,height:12,background:C.blue,borderRadius:2}}/>
              <span>Mittelwert (M)</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:20,height:8,background:C.blue+"22",borderRadius:3}}/>
              <span>Spannweite (Min–Max)</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:14,height:0,borderTop:`2px dashed ${C.coral}88`}}/>
              <span>Cut-off (auffällig)</span>
            </div>
          </div>
        </div>

        <div style={{background:C.goldBg,border:`1px solid ${C.gold}44`,borderRadius:10,padding:"16px",marginBottom:20}}>
          <div style={{color:C.goldL,fontWeight:700,fontSize:12,marginBottom:8}}>💡 Interpretationshinweise</div>
          <div style={{color:C.cream,fontSize:11,lineHeight:1.8}}>
            <p style={{margin:"0 0 6px"}}>
              <strong style={{color:C.goldL}}>Team Assessment:</strong> Werte unter 33% (gestrichelte rote Linie) zeigen Dimensionen, die besondere Aufmerksamkeit erfordern. Die fünf Dimensionen bauen aufeinander auf: Vertrauen → Konfliktbereitschaft → Verbindlichkeit → Verantwortlichkeit → Ergebnisorientierung.
            </p>
            <p style={{margin:"0 0 6px"}}>
              <strong style={{color:C.goldL}}>Psychologische Sicherheit:</strong> Werte unter 50% (M {"<"} 4.0 auf 7er-Skala) weisen auf eine eingeschränkte psychologische Sicherheit hin, die offene Kommunikation erschwert.
            </p>
            <p style={{margin:"0 0 6px"}}>
              <strong style={{color:C.goldL}}>Feedbackorientierung:</strong> Hier gibt es kein "richtig" oder "falsch" — hohe Streuung (SD {">"} 15, markiert mit ↔ Heterogen) deutet auf unterschiedliche Präferenzen im Team hin, die Gesprächsstoff für den Workshop bieten.
            </p>
            <p style={{margin:0}}>
              Nutzen Sie den <strong>Team-CSV-Export</strong> für vertiefende Analysen in R oder SPSS.
            </p>
          </div>
        </div>
        </>)}

        {/* PAGE 2: Offene Rückmeldungen */}
        {facPage === "text" && (
          <div>
            {profiles.some(p => p.scores && (p.scores.AGL_Open1 || p.scores.AGL_Open2 || p.scores.AGL_Open3 || p.scores.AGL_Open4)) ? (
              <div style={{background:C.surface,border:`1px solid ${C.rose}44`,borderRadius:10,padding:"16px",marginBottom:14}}>
                <h3 style={{fontFamily:"Georgia,serif",fontSize:15,color:C.rose,margin:"0 0 12px"}}>AG-Leitung — Offene Rückmeldungen</h3>
                <p style={{color:C.muted,fontSize:11,margin:"0 0 16px",lineHeight:1.5}}>Alle qualitativen Antworten der {profiles.length} Teilnehmenden, anonymisiert und nach Frage gruppiert.</p>
                {[
                  {key:"AGL_Open1", label:"Was schätze ich an der Leitung besonders?"},
                  {key:"AGL_Open2", label:"Was sollte die AG-Leitung beibehalten? (Continue)"},
                  {key:"AGL_Open3", label:"Was sollte die AG-Leitung verändern oder lassen? (Stop)"},
                  {key:"AGL_Open4", label:"Was würde ich mir zusätzlich wünschen? (Start)"},
                ].map(q => {
                  const responses = profiles.map(p => p.scores?.[q.key]).filter(v => v && v !== "" && v !== "0" && v !== 0);
                  if (responses.length === 0) return null;
                  return (
                    <div key={q.key} style={{marginBottom:18}}>
                      <div style={{color:C.goldL,fontWeight:700,fontSize:12,marginBottom:8}}>{q.label}</div>
                      {responses.map((r,i) => (
                        <div key={i} style={{background:C.faint,borderRadius:7,padding:"10px 14px",marginBottom:5,fontSize:12,color:C.cream,lineHeight:1.6,borderLeft:`3px solid ${C.rose}66`}}>
                          „{r}"
                        </div>
                      ))}
                      <div style={{color:C.muted,fontSize:10,marginTop:4}}>{responses.length} von {profiles.length} Antworten</div>
                    </div>
                  );
                })}
              </div>
            ) : (
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"24px",textAlign:"center",marginBottom:14}}>
                <div style={{fontSize:28,marginBottom:8}}>📝</div>
                <div style={{color:C.cream,fontWeight:600,fontSize:13,marginBottom:4}}>Noch keine offenen Rückmeldungen</div>
                <p style={{color:C.muted,fontSize:11,margin:0}}>Sobald Teilnehmende die offenen Fragen im AG-Leitung Feedback ausgefüllt haben, erscheinen die Antworten hier.</p>
              </div>
            )}
          </div>
        )}
      </>)}
    </div>
  );
}

// ══ UI COMPONENTS ══
function LikertItem({idx,item,value,onChange,minVal,maxVal,reversed}) {
  const opts = Array.from({length:maxVal-minVal+1},(_,i)=>i+minVal);
  return (
    <div style={{background:value!==undefined?C.surfaceHi:C.surface,border:`1px solid ${value!==undefined?C.border:C.faint}`,borderRadius:9,padding:"12px 14px",marginBottom:7,transition:"all 0.2s"}}>
      <div style={{display:"flex",gap:9,alignItems:"flex-start"}}>
        <span style={{color:C.gold,fontWeight:700,fontSize:11,minWidth:22,paddingTop:2}}>{idx}.</span>
        <div style={{flex:1}}>
          <p style={{color:C.cream,fontSize:13,lineHeight:1.6,margin:0}}>{item.q}</p>
          {reversed&&<span style={{color:C.muted,fontSize:9,marginTop:2,display:"inline-block"}}>↻ Umkehritem</span>}
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginTop:10,paddingLeft:31,flexWrap:"wrap"}}>
        {opts.map(opt=>(
          <button key={opt} onClick={()=>onChange(item.id,opt)} style={{width:32,height:32,borderRadius:"50%",border:`2px solid ${value===opt?C.gold:C.border}`,background:value===opt?C.gold:"transparent",color:value===opt?"#000":C.muted,fontSize:11,fontWeight:700,cursor:"pointer",transition:"all 0.15s",flexShrink:0}}>{opt}</button>
        ))}
      </div>
    </div>
  );
}

function ScaleLegend({low,high,min,max}) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.faint,borderRadius:7,padding:"7px 12px",marginBottom:14}}>
      <span style={{color:C.muted,fontSize:11}}>{min} = {low}</span>
      <div style={{display:"flex",gap:5}}>
        {Array.from({length:max-min+1},(_,i)=>i+min).map(n=>(
          <div key={n} style={{width:24,height:24,borderRadius:"50%",background:C.surface,border:`1px solid ${C.border}`,color:C.muted,fontSize:10,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center"}}>{n}</div>
        ))}
      </div>
      <span style={{color:C.muted,fontSize:11}}>{max} = {high}</span>
    </div>
  );
}

function ResultBar({label,value,color}) {
  const bc = scoreColor(value);
  return (
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
        <span style={{color:C.cream,fontSize:12,fontWeight:500}}>{label}</span>
        <span style={{background:bc+"33",color:bc,border:`1px solid ${bc}66`,borderRadius:20,padding:"1px 8px",fontSize:10,fontWeight:600}}>{value}% · {scoreLabel(value)}</span>
      </div>
      <div style={{height:6,background:C.faint,borderRadius:3,overflow:"hidden"}}>
        <div style={{width:`${value}%`,height:"100%",background:`linear-gradient(90deg,${color},${color}bb)`,borderRadius:3}}/>
      </div>
    </div>
  );
}

function SectionHeader({badge,title,sub,color,original}) {
  return (
    <div style={{marginBottom:18}}>
      <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap",marginBottom:7}}>
        <div style={{background:color+"22",border:`1px solid ${color}55`,color,borderRadius:5,padding:"2px 8px",fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>{badge}</div>
        {original
          ? <span style={{background:"rgba(74,158,114,0.2)",border:"1px solid rgba(74,158,114,0.5)",color:C.green,borderRadius:5,padding:"2px 7px",fontSize:9,fontWeight:700}}>✓ Original · Frei verfügbar</span>
          : <span style={{background:"rgba(201,146,28,0.12)",border:"1px solid rgba(201,146,28,0.4)",color:C.goldL,borderRadius:5,padding:"2px 7px",fontSize:9,fontWeight:700}}>⚠ Konzeptuell inspiriert</span>}
      </div>
      <h2 style={{color:C.cream,fontSize:19,fontWeight:700,margin:"0 0 4px",fontFamily:"Georgia,serif"}}>{title}</h2>
      {sub&&<p style={{color:C.muted,fontSize:11,margin:0,fontStyle:"italic"}}>{sub}</p>}
    </div>
  );
}

function ProgressBar({step}) {
  const steps = ["Team", "Psych.S.", "FOS", "AG-Ltg."];
  return (
    <div style={{display:"flex",gap:3,marginBottom:22,alignItems:"center"}}>
      {steps.map((s,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",flex:i<steps.length-1?1:"none"}}>
          <div style={{width:24,height:24,borderRadius:"50%",flexShrink:0,background:i<step-1?C.green:i===step-1?C.gold:C.faint,border:`2px solid ${i<step-1?C.green:i===step-1?C.gold:C.border}`,color:i<step-1?"#fff":i===step-1?"#000":C.muted,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {i<step-1?"✓":i+1}
          </div>
          <span style={{color:i===step-1?C.goldL:C.muted,fontSize:9,marginLeft:3,whiteSpace:"nowrap"}}>{s}</span>
          {i<steps.length-1&&<div style={{flex:1,height:2,background:i<step-1?C.green+"66":C.faint,marginLeft:3}}/>}
        </div>
      ))}
    </div>
  );
}

function NextBtn({ready,count,onClick,label,color}) {
  return (
    <button onClick={()=>ready&&onClick()} disabled={!ready} style={{width:"100%",padding:"13px",borderRadius:9,marginTop:10,background:ready?(color?`linear-gradient(135deg,${color},${color}cc)`:`linear-gradient(135deg,${C.gold},${C.goldL})`):C.faint,color:ready?"#000":C.muted,fontWeight:700,fontSize:13,border:"none",cursor:ready?"pointer":"default",transition:"all 0.2s"}}>
      {ready?label:`Noch ${count} Frage(n) offen`}
    </button>
  );
}

// ══ RESULTS PREVIEW ══
function ResultsPreview({scores}) {
  const block = (accent,title,children) => (
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 14px",marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <div style={{width:4,height:16,background:accent,borderRadius:2}}/>
        <h3 style={{fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,color:C.cream,margin:0}}>{title}</h3>
      </div>
      {children}
    </div>
  );

  return (
    <div>
      {block(C.blue,"Team Assessment · 5 Dimensionen",
        Object.entries(scores.ta).map(([d,{pct}]) => (
          <div key={d}>
            <ResultBar label={d} value={pct} color={TA_DIMS[Object.keys(TA_DIMS).find(k=>TA_DIMS[k].label===d)].color}/>
            <p style={{color:C.muted,fontSize:10,margin:"4px 0 8px 0",lineHeight:1.5}}>{getTAInterpretation(d,pct)}</p>
          </div>
        ))
      )}
      {block(C.sky,"Psychologische Sicherheit",
        <div>
          <ResultBar label="Gesamt" value={scores.ps} color={C.sky}/>
          <p style={{color:C.muted,fontSize:10,margin:"4px 0 0 0",lineHeight:1.5}}>{getPSInterpretation(scores.ps)}</p>
        </div>
      )}
      {block(C.lime,"Feedbackorientierung · 4 Dimensionen",
        Object.entries(scores.fos).map(([d,pct]) => (
          <div key={d}>
            <ResultBar label={d} value={pct} color={FOS_DIMS[Object.keys(FOS_DIMS).find(k=>FOS_DIMS[k].label===d)].color}/>
            <p style={{color:C.muted,fontSize:10,margin:"4px 0 8px 0",lineHeight:1.5}}>{getFOSInterpretation(d,pct)}</p>
          </div>
        ))
      )}
      {scores.agl && block(C.rose,"AG-Leitung Feedback · Hybrid",
        <div>
          {Object.entries(scores.agl).map(([q,val]) => (
            <div key={q}>
              <ResultBar label={q} value={val} color={C.rose}/>
              <p style={{color:C.muted,fontSize:10,margin:"4px 0 8px 0",lineHeight:1.5}}>{getAGLInterpretation(val)}</p>
            </div>
          ))}
          <div style={{marginTop:8}}>
            <ResultBar label="Gesamtwert AG-Leitung" value={scores.aglMean} color={C.rose}/>
          </div>
          {scores.aglOpen && Object.entries(scores.aglOpen).some(([,t])=>t) && (
            <div style={{marginTop:14}}>
              <div style={{color:C.rose,fontWeight:700,fontSize:11,marginBottom:8}}>Qualitative Rückmeldungen</div>
              {Object.entries(scores.aglOpen).map(([q,text]) => text ? (
                <div key={q} style={{background:C.faint,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                  <div style={{color:C.cream,fontSize:10,fontWeight:600,marginBottom:4}}>{q}</div>
                  <div style={{color:C.muted,fontSize:11,lineHeight:1.6,fontStyle:"italic"}}>"{text}"</div>
                </div>
              ) : null)}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ══ MAIN APP ══
function App() {
  const urlTeamCode = getTeamCode();
  const urlView = new URLSearchParams(window.location.search).get("view");
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const name = "Anonym";
  const [pdfStatus, setPdfStatus] = useState("idle");
  const [mode, setMode] = useState(urlView === "facilitator" ? "facilitator" : "survey");
  const [saveStatus, setSaveStatus] = useState("idle");
  const topRef = useRef(null);

  const scores = step === 5 ? computeScores(answers) : null;
  const today = new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"});

  const handlePDF = useCallback(()=>{
    if(pdfStatus!=="idle"||!scores) return;
    generatePDF(scores, name||"Reflexionsprofil", today, setPdfStatus);
  },[pdfStatus,scores,name,today]);

  useEffect(() => {
    if (step === 5 && scores && urlTeamCode && saveStatus === "idle") {
      setSaveStatus("saving");
      saveScoresToDB(urlTeamCode, name, scores).then(ok => {
        setSaveStatus(ok ? "saved" : "error");
      });
    }
  }, [step, scores, urlTeamCode, saveStatus]);

  if (mode === "facilitator") return <FacilitatorView onBack={()=>setMode("survey")} teamCode={urlTeamCode} />;

  const setAns = (id,v) => setAnswers(p=>({...p,[id]:v}));
  const allDone = items => items.every(i=>answers[i.id]!==undefined);
  const go = n => { setStep(n); setTimeout(()=>topRef.current?.scrollIntoView({behavior:"smooth"}),50); };

  const PDF_BTN_LABELS = {
    idle:       "⬇ PDF erstellen & herunterladen",
    building:   "📄 PDF wird aufgebaut …",
    done:       "✓ PDF erfolgreich gespeichert!",
    error:      "⚠ Fehler — erneut versuchen",
  };

  const PDFButton = ()=>(
    <button onClick={handlePDF} disabled={pdfStatus!=="idle"} style={{
      width:"100%",padding:"14px",borderRadius:9,border:"none",cursor:pdfStatus==="idle"?"pointer":"default",
      background: pdfStatus==="idle"?`linear-gradient(135deg,${C.gold},${C.goldL})`:
                  pdfStatus==="done"?C.green+"33":pdfStatus==="error"?C.coral+"33":C.faint,
      color: pdfStatus==="idle"?"#000":pdfStatus==="done"?C.green:pdfStatus==="error"?C.coral:C.muted,
      fontWeight:700,fontSize:14,transition:"all 0.3s",
    }}>
      {PDF_BTN_LABELS[pdfStatus]}
    </button>
  );

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:C.bg,minHeight:"100vh",color:C.cream,paddingBottom:60}}>
      <div style={{maxWidth:700,margin:"0 auto",padding:"0 14px"}} ref={topRef}>

        {/* STEP 0: START */}
        {step === 0 && (
          <div style={{paddingTop:40}}>
            <h1 style={{fontFamily:"Georgia,serif",fontSize:32,fontWeight:700,margin:"0 0 8px",textAlign:"center"}}>Team-Reflexion</h1>
            <p style={{color:C.muted,fontSize:13,margin:"0 0 30px",textAlign:"center",lineHeight:1.6}}>Kommunikationsprofil · Vier Instrumente zur Analyse von Teamdynamiken und Führung</p>

            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px",marginBottom:24}}>
              <div style={{background:C.goldBg,border:`1px solid ${C.gold}44`,borderRadius:8,padding:"12px",marginBottom:20}}>
                <div style={{color:C.goldL,fontWeight:700,fontSize:11}}>🔒 Anonyme Befragung</div>
                <p style={{color:C.cream,fontSize:12,margin:"6px 0 0",lineHeight:1.5}}>Alle Antworten werden vollständig anonym erhoben und gespeichert.</p>
              </div>

              <div style={{color:C.goldL,fontWeight:700,fontSize:14,marginBottom:14}}>Instrumente</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
                <div style={{background:C.faint,borderRadius:8,padding:"12px",borderLeft:`4px solid ${C.blue}`}}>
                  <div style={{color:C.blue,fontWeight:700,fontSize:11}}>Instrument 1</div>
                  <div style={{color:C.cream,fontSize:12,marginTop:4}}>Team Assessment</div>
                  <div style={{color:C.muted,fontSize:10,marginTop:2}}>15 Fragen · 3-Punkte-Skala</div>
                </div>
                <div style={{background:C.faint,borderRadius:8,padding:"12px",borderLeft:`4px solid ${C.sky}`}}>
                  <div style={{color:C.sky,fontWeight:700,fontSize:11}}>Instrument 2</div>
                  <div style={{color:C.cream,fontSize:12,marginTop:4}}>Psych. Sicherheit</div>
                  <div style={{color:C.muted,fontSize:10,marginTop:2}}>7 Fragen · 7-Punkte-Skala</div>
                </div>
                <div style={{background:C.faint,borderRadius:8,padding:"12px",borderLeft:`4px solid ${C.lime}`}}>
                  <div style={{color:C.lime,fontWeight:700,fontSize:11}}>Instrument 3</div>
                  <div style={{color:C.cream,fontSize:12,marginTop:4}}>Feedbackorientierung</div>
                  <div style={{color:C.muted,fontSize:10,marginTop:2}}>20 Fragen · 5-Punkte-Skala</div>
                </div>
                <div style={{background:C.faint,borderRadius:8,padding:"12px",borderLeft:`4px solid ${C.rose}`}}>
                  <div style={{color:C.rose,fontWeight:700,fontSize:11}}>Instrument 4</div>
                  <div style={{color:C.cream,fontSize:12,marginTop:4}}>AG-Leitung Feedback</div>
                  <div style={{color:C.muted,fontSize:10,marginTop:2}}>4 Likert-Items + 4 offene Fragen</div>
                </div>
              </div>

              <div style={{background:C.goldBg,border:`1px solid ${C.gold}44`,borderRadius:8,padding:"12px",marginBottom:20}}>
                <div style={{color:C.goldL,fontWeight:700,fontSize:11}}>⏱ Zeitaufwand</div>
                <p style={{color:C.cream,fontSize:12,margin:"6px 0 0",lineHeight:1.5}}>ca. 10–15 Min. für alle 4 Instrumente (46 Items + 4 offene Fragen)</p>
              </div>

              <button
                onClick={()=>go(1)}
                style={{width:"100%",padding:"14px",borderRadius:9,background:`linear-gradient(135deg,${C.gold},${C.goldL})`,color:"#000",fontWeight:700,fontSize:14,border:"none",cursor:"pointer",marginBottom:12}}
              >
                Jetzt starten →
              </button>

              <button
                onClick={()=>setMode("facilitator")}
                style={{width:"100%",padding:"12px",borderRadius:9,background:"transparent",border:`1px solid ${C.border}`,color:C.muted,fontWeight:600,fontSize:12,cursor:"pointer"}}
              >
                Oder: Facilitator-Ansicht öffnen
              </button>
            </div>
          </div>
        )}

        {/* STEP 1: TEAM ASSESSMENT */}
        {step === 1 && (
          <div style={{paddingTop:30}}>
            <ProgressBar step={1}/>
            <SectionHeader badge="Instrument 1 · Team Assessment" title="Team Assessment" sub="15 Fragen zur Teameffektivität · 3-Punkte-Skala" color={C.blue}/>
            <ScaleLegend low="Selten" high="Trifft meist zu" min={1} max={3}/>
            {TA_ITEMS.map((item,idx)=>(
              <LikertItem key={item.id} idx={idx+1} item={item} value={answers[item.id]} onChange={setAns} minVal={1} maxVal={3} reversed={false}/>
            ))}
            <NextBtn ready={allDone(TA_ITEMS)} count={TA_ITEMS.filter(i=>!answers[i.id]).length} onClick={()=>go(2)} label="Weiter zu Psych. Sicherheit →" color={C.blue}/>
          </div>
        )}

        {/* STEP 2: PSYCHOLOGISCHE SICHERHEIT */}
        {step === 2 && (
          <div style={{paddingTop:30}}>
            <ProgressBar step={2}/>
            <SectionHeader badge="Instrument 2 · Psychologische Sicherheit" title="Psychologische Sicherheit" sub="7 Fragen · 7-Punkte-Skala" color={C.sky} original={true}/>
            <p style={{color:C.muted,fontSize:10,marginBottom:14}}>Original · Frei verfügbar (Edmondson, 1999)</p>
            <ScaleLegend low="Stimme gar nicht zu" high="Stimme voll zu" min={1} max={7}/>
            {PS_ITEMS.map((item,idx)=>(
              <LikertItem key={item.id} idx={idx+1} item={item} value={answers[item.id]} onChange={setAns} minVal={1} maxVal={7} reversed={item.r}/>
            ))}
            <NextBtn ready={allDone(PS_ITEMS)} count={PS_ITEMS.filter(i=>!answers[i.id]).length} onClick={()=>go(3)} label="Weiter zu Feedbackorientierung →" color={C.sky}/>
          </div>
        )}

        {/* STEP 3: FEEDBACKORIENTIERUNG */}
        {step === 3 && (
          <div style={{paddingTop:30}}>
            <ProgressBar step={3}/>
            <SectionHeader badge="Instrument 3 · Feedbackorientierung" title="Feedbackorientierung" sub="20 Fragen · 5-Punkte-Skala" color={C.lime} original={false}/>
            <p style={{color:C.muted,fontSize:10,marginBottom:14}}>Konzeptuell inspiriert von Linderbaum & Levy (2010)</p>
            <ScaleLegend low="Stimme gar nicht zu" high="Stimme voll zu" min={1} max={5}/>

            {Object.entries(FOS_DIMS).map(([s,{label}]) => {
              const subItems = FOS_ITEMS.filter(i=>i.s===s);
              return (
                <div key={s} style={{marginBottom:24}}>
                  <div style={{background:C.faint,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",marginBottom:12}}>
                    <div style={{color:FOS_DIMS[s].color,fontWeight:700,fontSize:11}}>{label}</div>
                  </div>
                  {subItems.map((item,idx)=>(
                    <LikertItem key={item.id} idx={FOS_ITEMS.indexOf(item)+1} item={item} value={answers[item.id]} onChange={setAns} minVal={1} maxVal={5} reversed={false}/>
                  ))}
                </div>
              );
            })}
            <NextBtn ready={allDone(FOS_ITEMS)} count={FOS_ITEMS.filter(i=>!answers[i.id]).length} onClick={()=>go(4)} label="Weiter zu AG-Leitung Feedback →" color={C.lime}/>
          </div>
        )}

        {/* STEP 4: AG-LEITUNG FEEDBACK */}
        {step === 4 && (
          <div style={{paddingTop:30}}>
            <ProgressBar step={4}/>
            <SectionHeader badge="Instrument 4 · AG-Leitung Feedback" title="Feedback zur AG-Leitung" sub="4 Kurzfragen + 4 offene Rückmeldungen" color={C.rose} original={false}/>
            <p style={{color:C.muted,fontSize:10,marginBottom:14}}>Hybridformat: Quantitative Einschätzung + qualitative Rückmeldungen (Stop–Start–Continue)</p>
            <ScaleLegend low="Stimme gar nicht zu" high="Stimme voll zu" min={1} max={7}/>

            <div style={{background:C.faint,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",marginBottom:12}}>
              <div style={{color:C.rose,fontWeight:700,fontSize:11}}>Quantitative Einschätzung</div>
            </div>
            {AGL_ITEMS.map((item,idx)=>(
              <LikertItem key={item.id} idx={idx+1} item={item} value={answers[item.id]} onChange={setAns} minVal={1} maxVal={7} reversed={false}/>
            ))}

            <div style={{background:C.faint,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",marginTop:24,marginBottom:12}}>
              <div style={{color:C.rose,fontWeight:700,fontSize:11}}>Qualitative Rückmeldungen (optional)</div>
            </div>
            {AGL_OPEN.map((item,idx)=>(
              <div key={item.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,padding:"12px 14px",marginBottom:7}}>
                <div style={{display:"flex",gap:9,alignItems:"flex-start",marginBottom:8}}>
                  <span style={{color:C.rose,fontWeight:700,fontSize:11,minWidth:22,paddingTop:2}}>{idx+1}.</span>
                  <p style={{color:C.cream,fontSize:13,lineHeight:1.6,margin:0}}>{item.q}</p>
                </div>
                <textarea
                  value={answers[item.id]||""}
                  onChange={e=>setAns(item.id, e.target.value)}
                  placeholder="Ihre Rückmeldung (optional)…"
                  rows={3}
                  style={{width:"100%",padding:"10px 12px",borderRadius:7,background:C.faint,border:`1px solid ${C.border}`,color:C.cream,fontSize:12,outline:"none",resize:"vertical",fontFamily:"inherit",lineHeight:1.6}}
                />
              </div>
            ))}

            <NextBtn ready={allDone(AGL_ITEMS)} count={AGL_ITEMS.filter(i=>!answers[i.id]).length} onClick={()=>go(5)} label="Zu Ergebnissen →" color={C.rose}/>
          </div>
        )}

        {/* STEP 5: RESULTS */}
        {step === 5 && scores && (
          <div style={{paddingTop:30}}>
            <h1 style={{fontFamily:"Georgia,serif",fontSize:26,fontWeight:700,margin:"0 0 8px",textAlign:"center",color:C.goldL}}>Ihre Ergebnisse</h1>
            <p style={{color:C.muted,fontSize:12,margin:"0 0 24px",textAlign:"center"}}>Detaillierte Analyse Ihrer Antworten zu allen 4 Instrumenten</p>

            <ResultsPreview scores={scores}/>

            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 14px",marginTop:24,marginBottom:24}}>
              <PDFButton/>
              <button
                onClick={()=>scoresToCSV(name||"Profil",scores)}
                style={{width:"100%",padding:"14px",borderRadius:9,marginTop:10,background:"transparent",border:`1px solid ${C.border}`,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}
              >
                ⬇ CSV exportieren
              </button>
            </div>

            <button
              onClick={()=>go(0)}
              style={{width:"100%",padding:"12px",borderRadius:9,background:"transparent",border:`1px solid ${C.border}`,color:C.muted,fontWeight:600,fontSize:12,cursor:"pointer"}}
            >
              ← Neues Profil erstellen
            </button>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
