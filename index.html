async function saveScoresToDB(teamCode, name, scores) {
  const flat = flattenScores(scores);
  const {error} = await supabase.from("profiles").insert({team_code: teamCode, name: name || "Anonym", scores: flat});

}

async function loadTeamProfiles(teamCode) {
  const {data, error} = await supabase.from("profiles").select("*").eq("team_code", teamCode).order("created_at", {ascending: true});

}

// ══ HELPER FUNCTIONS ══
function pct(mean, scaleMin, scaleMax) {
  if (scaleMax === scaleMin) return 0;
  return Math.round(((mean - scaleMin) / (scaleMax - scaleMin)) * 100);
}
function meanOf(vals) { return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0; }

function computeScores(ans) {
  // Team Assessment (raw sum + pct)
  const ta = {};
  for (const [d,{label}] of Object.entries(TA_DIMS)) {
    const vals = TA_ITEMS.filter(i=>i.d===d).map(i=>ans[i.id]).filter(v=>v!==undefined);
    if (vals.length) {
      const rawSum = vals.reduce((a,b)=>a+b,0);
      ta[label] = {rawSum, pct: pct(rawSum, 3, 9)};
    } else {
      ta[label] = {rawSum: 0, pct: 0};
    }
  }

  // CSI (percentage per dimension)
  const csi = {};
  for (const [d,{label}] of Object.entries(CSI_DIMS)) {
    const vals = CSI_ITEMS.filter(i=>i.d===d).map(i=>ans[i.id]).filter(v=>v!==undefined);
    csi[label] = vals.length ? pct(meanOf(vals), 1, 5) : 0;
  }

  // Psychologische Sicherheit (single percentage)
  const psVals = PS_ITEMS.map(i=>{const r=ans[i.id]; return r!==undefined?(i.r?8-r:r):null;}).filter(v=>v!==null);
  const ps = psVals.length ? pct(meanOf(psVals), 1, 7) : 0;

  // Feedbackorientierung (percentage per subscale)
  const fos = {};
  for (const [s,{label}] of Object.entries(FOS_DIMS)) {
    const vals = FOS_ITEMS.filter(i=>i.s===s).map(i=>ans[i.id]).filter(v=>v!==undefined);
    fos[label] = vals.length ? pct(meanOf(vals), 1, 5) : 0;
  }

  return {ta, csi, ps, fos};
}

    console.error(err);
    setStatus("error");
    setTimeout(()=>setStatus("idle"), 4000);
  }
}

function buildPDF(name, date, scores) {
  const {jsPDF} = window;
  const doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const w = doc.internal.pageSize.getWidth();
  const h = doc.internal.pageSize.getHeight();
  let y = 15;

  const addLine = ()=>{ doc.setLineWidth(0.5); doc.setDrawColor("#1e3050"); doc.line(14, y, w-14, y); y += 4; };
  const addTitle = (text,size,color)=>{ doc.setFontSize(size); doc.setTextColor(color||"#e8ddc8"); doc.text(text, 14, y); y += size/2.5; };
  const addText = (text,size,color)=>{ doc.setFontSize(size); doc.setTextColor(color||"#6a7a8e"); doc.text(text, 14, y, {maxWidth:w-28}); y += doc.getTextDimensions(text).h+2; };

  doc.setFillColor(11, 19, 33);
  doc.rect(0, 0, w, h, "F");

  addTitle("Team-Reflexion · Kommunikationsprofil", 20, "#c9921c");
  addText(`Profil: ${name}`, 10, "#e8ddc8");
  addText(`Erstellungsdatum: ${date}`, 9, "#6a7a8e");
  addLine();

  // Team Assessment
  addTitle("Instrument 1: Team Assessment", 14, "#4d8fd4");
  addText("5 Dimensionen der Teameffektivität", 9, "#6a7a8e");
  y += 4;
  for (const [dim, score] of Object.entries(scores.ta)) {
    const interpretation = getTAInterpretation(dim, score.pct);
    addText(`${dim}: ${score.rawSum}/9 (${score.pct}%)`, 10, score.pct < 34 ? "#d46a5a" : score.pct < 67 ? "#d4a03a" : "#4a9e72");
    addText(interpretation, 8, "#6a7a8e");
    y += 2;
  }
  addLine();

  // CSI
  addTitle("Instrument 2: Kommunikationsstile", 14, "#4a9e72");
  addText("Konzeptuell inspiriert von de Vries et al. (2013)", 9, "#6a7a8e");
  y += 4;
  for (const [dim, pct] of Object.entries(scores.csi)) {
    const interpretation = getCSIInterpretation(dim, pct);
    addText(`${dim}: ${pct}%`, 10, pct < 34 ? "#d46a5a" : pct < 67 ? "#d4a03a" : "#4a9e72");
    addText(interpretation, 8, "#6a7a8e");
    y += 2;
  }
  addLine();

  // PS
  addTitle("Instrument 3: Psychologische Sicherheit", 14, "#3ab8c4");
  addText("Original · Frei verfügbar (Edmondson, 1999)", 9, "#6a7a8e");
  y += 4;
  const psInterpretation = getPSInterpretation(scores.ps);
  addText(`Gesamt: ${scores.ps}%`, 10, scores.ps < 34 ? "#d46a5a" : scores.ps < 67 ? "#d4a03a" : "#4a9e72");
  addText(psInterpretation, 8, "#6a7a8e");
  addLine();

  // FOS
  addTitle("Instrument 4: Feedbackorientierung", 14, "#7ab84a");
  addText("Konzeptuell inspiriert von Linderbaum & Levy (2010)", 9, "#6a7a8e");
  y += 4;
  for (const [dim, pct] of Object.entries(scores.fos)) {
    const interpretation = getFOSInterpretation(dim, pct);
    addText(`${dim}: ${pct}%`, 10, pct < 34 ? "#d46a5a" : pct < 67 ? "#d4a03a" : "#4a9e72");
    addText(interpretation, 8, "#6a7a8e");
    y += 2;
  }

  doc.save(`TeamReflexion_${(name||"Profil").replace(/\s+/g,"_")}.pdf`);
}

// ══ CSV EXPORT ══
function scoresToCSV(name, scores) {
  const rows = [["Kategorie","Dimension","Wert"]];
  for (const [dim,{pct}] of Object.entries(scores.ta)) rows.push(["Team Assessment",dim,pct]);
  for (const [dim,val] of Object.entries(scores.csi)) rows.push(["CSI",dim,val]);
  rows.push(["Psychologische Sicherheit","Gesamt",scores.ps]);
  for (const [dim,val] of Object.entries(scores.fos)) rows.push(["Feedbackorientierung",dim,val]);
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `Scores_${(name||"Profil").replace(/\s+/g,"_")}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ══ FLAT SCORES FOR SUPABASE ══
function flattenScores(scores) {
  const flat = {};
  for (const [dim,{pct}] of Object.entries(scores.ta)) flat["TA_"+dim] = pct;
  for (const [dim,val] of Object.entries(scores.csi)) flat["CSI_"+dim] = val;
  flat["PS_Gesamt"] = scores.ps;
  for (const [dim,val] of Object.entries(scores.fos)) flat["FOS_"+dim] = val;
  return flat;
}

function parseCSV(text) {
  const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n").filter(l=>l.trim());
  if (lines.length < 2) return null;
  const rows = lines.slice(1).map(l => {
    const cells = [];
    let cur = "", inQ = false;
    for (let i = 0; i < l.length; i++) {
      const ch = l[i];
      if (ch === '"') { inQ = !inQ; continue; }
      if ((ch === ';' || ch === ',') && !inQ) { cells.push(cur.trim()); cur = ""; continue; }
      cur += ch;
    }
    cells.push(cur.trim());
    return cells;
  });
  const flat = {};
  for (const [cat,dim,val] of rows) {
    const key = cat.replace(/[.\s-]+/g,"_") + "_" + dim.replace(/[()–\s]+/g,"_").replace(/_+$/,"");
    flat[key] = parseFloat(val) || 0;
  }
  return flat;
}

  const [autoRefresh, setAutoRefresh] = useState(true);
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef(null);

  const loadProfiles = async (code) => {
    if (!code) return;
    setLoading(true);
    const data = await loadTeamProfiles(code);
    setProfiles(data.map(d => ({name: d.name, scores: d.scores, id: d.id, created_at: d.created_at})));
    setLoading(false);
  };

  useEffect(() => { if (teamCode) loadProfiles(teamCode); }, [teamCode]);

  useEffect(() => {
    if (!teamCode || !autoRefresh) return;
    const interval = setInterval(() => loadProfiles(teamCode), 15000);
    return () => clearInterval(interval);
  }, [teamCode, autoRefresh]);

  const addFiles = (files) => {
    Array.from(files).forEach(f => {
      if (!f.name.endsWith('.csv')) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const flat = parseCSV(e.target.result);
        if (flat) {
          const name = f.name.replace(/^Scores_/,"").replace(/\.csv$/,"").replace(/_/g," ");
          setProfiles(p => [...p, {name, scores: flat, id: Date.now()+Math.random()}]);
        }
      };
      reader.readAsText(f);
    });
  };

  const generateCode = () => {
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
    let code = "";
    for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random()*chars.length)];
    setTeamCode(code);
    setProfiles([]);
  };

  const [copied, setCopied] = useState(false);
  const teamLink = teamCode ? `${window.location.origin}${window.location.pathname}?team=${teamCode}` : "";
  const copyLink = () => {
    navigator.clipboard.writeText(teamLink).then(() => { setCopied(true); setTimeout(()=>setCopied(false), 2000); });
  };

  const removeProfile = (id) => setProfiles(p => p.filter(x => x.id !== id));

  const agg = profiles.length > 1 ? (() => {
    const keys = Object.keys(profiles[0].scores);
    const result = {};
    for (const k of keys) {
      const vals = profiles.map(p => p.scores[k] || 0);
      const mean = vals.reduce((a,b)=>a+b,0) / vals.length;
      const sd = Math.sqrt(vals.reduce((a,b)=>a+(b-mean)**2,0) / vals.length);
      const min = Math.min(...vals);
      const max = Math.max(...vals);
      result[k] = {mean: Math.round(mean), sd: Math.round(sd*10)/10, min, max, vals};
    }
    return result;
  })() : null;

  const groupKeys = (agg) => {
    if (!agg) return [];
    const groups = {};
    for (const k of Object.keys(agg)) {
      const prefix = k.split("_")[0];
      const label = {TA:"Team Assessment",CSI:"Kommunikationsstile",PS:"Psychologische Sicherheit",FOS:"Feedbackorientierung"}[prefix] || prefix;
      const color = {TA:C.blue,CSI:C.green,PS:C.sky,FOS:C.lime}[prefix] || C.cream;
      if (!groups[prefix]) groups[prefix] = {label, color, dims: []};
      const dimName = k.replace(prefix+"_","").replace(/_/g," ");
      groups[prefix].dims.push({key: k, dim: dimName, ...agg[k]});
    }
    return Object.values(groups);
  };

  const exportTeamCSV = () => {
    if (!agg) return;
    const header = ["Dimension", ...profiles.map(p=>p.name), "M", "SD", "Min", "Max"];
    const rows = [header];
    for (const [k, v] of Object.entries(agg)) {
      const dimName = k.replace(/_/g," ");
      rows.push([dimName, ...v.vals.map(String), v.mean, v.sd, v.min, v.max]);
    }
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "Team_Aggregation.csv"; a.click();
    URL.revokeObjectURL(url);
  };

  const groups = groupKeys(agg);

  const taRadar = agg ? Object.keys(agg).filter(k=>k.startsWith("TA_")).map(k=>({
    subject: k.replace("TA_",""), Mittelwert: agg[k].mean, Min: agg[k].min, Max: agg[k].max
  })) : [];

  const csiRadar = agg ? Object.keys(agg).filter(k=>k.startsWith("CSI_")).map(k=>({

        </div>

      {!teamCode ? (

          <div style={{color:C.goldL,fontWeight:700,fontSize:14,marginBottom:14}}>Workshop-Team erstellen oder beitreten</div>
          <button onClick={generateCode} style={{width:"100%",padding:"13px",borderRadius:9,background:`linear-gradient(135deg,${C.gold},${C.goldL})`,color:"#000",fontWeight:700,fontSize:13,border:"none",cursor:"pointer",marginBottom:14}}>Neuen Team-Code generieren</button>
          <div style={{color:C.muted,fontSize:11,marginBottom:8}}>Oder bestehenden Code eingeben:</div>
          <div style={{display:"flex",gap:8}}>

            <button onClick={()=>{if(inputCode.trim())setTeamCode(inputCode.trim());}} style={{padding:"10px 18px",borderRadius:8,background:C.blue,color:"#fff",fontWeight:600,fontSize:12,border:"none",cursor:"pointer"}}>Laden</button>
          </div>
        </div>
      ) : (
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px",marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div>
              <div style={{color:C.muted,fontSize:10,marginBottom:2}}>Team-Code</div>

        </div>

      {profiles.length > 0 && (

            Nutze den Team-CSV-Export für vertiefende Analysen in R oder SPSS.

}

    </div>
  );
}

function ScaleLegend({low,high,min,max}) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.faint,borderRadius:7,padding:"7px 12px",marginBottom:14}}>
      <span style={{color:C.muted,fontSize:11}}>{min} = {low}</span>
      <div style={{display:"flex",gap:5}}>
        {Array.from({length:max-min+1},(_,i)=>i+min).map(n=>(
          <div key={n} style={{width:24,height:24,borderRadius:"50%",background:C.surface,border:`1px solid ${C.border}`,color:C.muted,fontSize:10,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center"}}>{n}</div>
        ))}
      </div>
      <span style={{color:C.muted,fontSize:11}}>{max} = {high}</span>
    </div>
  );
}

function ResultBar({label,value,color}) {
  const bc = scoreColor(value);
  return (
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
        <span style={{color:C.cream,fontSize:12,fontWeight:500}}>{label}</span>
        <span style={{background:bc+"33",color:bc,border:`1px solid ${bc}66`,borderRadius:20,padding:"1px 8px",fontSize:10,fontWeight:600}}>{value}% · {scoreLabel(value)}</span>
      </div>
      <div style={{height:6,background:C.faint,borderRadius:3,overflow:"hidden"}}>
        <div style={{width:`${value}%`,height:"100%",background:`linear-gradient(90deg,${color},${color}bb)`,borderRadius:3}}/>
      </div>
    </div>
  );
}

function SectionHeader({badge,title,sub,color,original}) {
  return (
    <div style={{marginBottom:18}}>
      <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap",marginBottom:7}}>
        <div style={{background:color+"22",border:`1px solid ${color}55`,color,borderRadius:5,padding:"2px 8px",fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>{badge}</div>
        {original
          ? <span style={{background:"rgba(74,158,114,0.2)",border:"1px solid rgba(74,158,114,0.5)",color:C.green,borderRadius:5,padding:"2px 7px",fontSize:9,fontWeight:700}}>✓ Original · Frei verfügbar</span>
          : <span style={{background:"rgba(201,146,28,0.12)",border:"1px solid rgba(201,146,28,0.4)",color:C.goldL,borderRadius:5,padding:"2px 7px",fontSize:9,fontWeight:700}}>⚠ Konzeptuell inspiriert</span>}
      </div>
      <h2 style={{color:C.cream,fontSize:19,fontWeight:700,margin:"0 0 4px",fontFamily:"Georgia,serif"}}>{title}</h2>
      {sub&&<p style={{color:C.muted,fontSize:11,margin:0,fontStyle:"italic"}}>{sub}</p>}
    </div>
  );
}

function ProgressBar({step}) {
  const steps = ["Team", "Komm.", "Psych.S.", "FOS"];
  return (
    <div style={{display:"flex",gap:3,marginBottom:22,alignItems:"center"}}>
      {steps.map((s,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",flex:i<steps.length-1?1:"none"}}>
          <div style={{width:24,height:24,borderRadius:"50%",flexShrink:0,background:i<step-1?C.green:i===step-1?C.gold:C.faint,border:`2px solid ${i<step-1?C.green:i===step-1?C.gold:C.border}`,color:i<step-1?"#fff":i===step-1?"#000":C.muted,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {i<step-1?"✓":i+1}
          </div>
          <span style={{color:i===step-1?C.goldL:C.muted,fontSize:9,marginLeft:3,whiteSpace:"nowrap"}}>{s}</span>
          {i<steps.length-1&&<div style={{flex:1,height:2,background:i<step-1?C.green+"66":C.faint,marginLeft:3}}/>}
        </div>
      ))}
    </div>
  );
}

function NextBtn({ready,count,onClick,label,color}) {
  return (
    <button onClick={()=>ready&&onClick()} disabled={!ready} style={{width:"100%",padding:"13px",borderRadius:9,marginTop:10,background:ready?(color?`linear-gradient(135deg,${color},${color}cc)`:`linear-gradient(135deg,${C.gold},${C.goldL})`):C.faint,color:ready?"#000":C.muted,fontWeight:700,fontSize:13,border:"none",cursor:ready?"pointer":"default",transition:"all 0.2s"}}>
      {ready?label:`Noch ${count} Frage(n) offen`}
    </button>
  );
}

// ══ RESULTS PREVIEW ══
function ResultsPreview({scores}) {
  const block = (accent,title,children) => (
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 14px",marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <div style={{width:4,height:16,background:accent,borderRadius:2}}/>
        <h3 style={{fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,color:C.cream,margin:0}}>{title}</h3>
      </div>
      {children}
    </div>
  );

  return (
    <div>
      {block(C.blue,"Team Assessment · 5 Dimensionen",
        Object.entries(scores.ta).map(([d,{pct}]) => (
          <div key={d}>
            <ResultBar label={d} value={pct} color={TA_DIMS[Object.keys(TA_DIMS).find(k=>TA_DIMS[k].label===d)].color}/>
            <p style={{color:C.muted,fontSize:10,margin:"4px 0 8px 0",lineHeight:1.5}}>{getTAInterpretation(d,pct)}</p>
          </div>
        ))
      )}
      {block(C.green,"Kommunikationsstile · 6 Dimensionen",
        Object.entries(scores.csi).map(([d,pct]) => (
          <div key={d}>
            <ResultBar label={d} value={pct} color={CSI_DIMS[Object.keys(CSI_DIMS).find(k=>CSI_DIMS[k].label===d)].color}/>
            <p style={{color:C.muted,fontSize:10,margin:"4px 0 8px 0",lineHeight:1.5}}>{getCSIInterpretation(d,pct)}</p>
          </div>
        ))
      )}
      {block(C.sky,"Psychologische Sicherheit",
        <div>
          <ResultBar label="Gesamt" value={scores.ps} color={C.sky}/>
          <p style={{color:C.muted,fontSize:10,margin:"4px 0 0 0",lineHeight:1.5}}>{getPSInterpretation(scores.ps)}</p>
        </div>
      )}
      {block(C.lime,"Feedbackorientierung · 4 Dimensionen",
        Object.entries(scores.fos).map(([d,pct]) => (
          <div key={d}>
            <ResultBar label={d} value={pct} color={FOS_DIMS[Object.keys(FOS_DIMS).find(k=>FOS_DIMS[k].label===d)].color}/>
            <p style={{color:C.muted,fontSize:10,margin:"4px 0 8px 0",lineHeight:1.5}}>{getFOSInterpretation(d,pct)}</p>
          </div>
        ))
      )}
    </div>
  );
}

// ══ MAIN APP ══
function App() {
  const urlTeamCode = getTeamCode();
  const urlView = new URLSearchParams(window.location.search).get("view");
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [name, setName] = useState("");
  const [pdfStatus, setPdfStatus] = useState("idle");
  const [mode, setMode] = useState(urlView === "facilitator" ? "facilitator" : "survey");
  const [saveStatus, setSaveStatus] = useState("idle");
  const topRef = useRef(null);

  const scores = step === 5 ? computeScores(answers) : null;
  const today = new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"});

  useEffect(() => {
    if (step === 5 && scores && urlTeamCode && saveStatus === "idle") {
      setSaveStatus("saving");
      saveScoresToDB(urlTeamCode, name, scores).then(ok => {
        setSaveStatus(ok ? "saved" : "error");
      });
    }
  }, [step, scores, urlTeamCode, saveStatus]);

  if (mode === "facilitator") return <FacilitatorView onBack={()=>setMode("survey")} teamCode={urlTeamCode} />;

  const handlePDF = useCallback(()=>{
    if(pdfStatus!=="idle"||!scores) return;
    generatePDF(scores, name||"Reflexionsprofil", today, setPdfStatus);
  },[pdfStatus,scores,name,today]);

  const setAns = (id,v) => setAnswers(p=>({...p,[id]:v}));
  const allDone = items => items.every(i=>answers[i.id]!==undefined);
  const go = n => { setStep(n); setTimeout(()=>topRef.current?.scrollIntoView({behavior:"smooth"}),50); };

  const PDF_BTN_LABELS = {
    idle:       "⬇ PDF erstellen & herunterladen",
    building:   "📄 PDF wird aufgebaut …",
    done:       "✓ PDF erfolgreich gespeichert!",
    error:      "⚠ Fehler — erneut versuchen",
  };

  const PDFButton = ()=>(
    <button onClick={handlePDF} disabled={pdfStatus!=="idle"} style={{
      width:"100%",padding:"14px",borderRadius:9,border:"none",cursor:pdfStatus==="idle"?"pointer":"default",
      background: pdfStatus==="idle"?`linear-gradient(135deg,${C.gold},${C.goldL})`:
                  pdfStatus==="done"?C.green+"33":pdfStatus==="error"?C.coral+"33":C.faint,
      color: pdfStatus==="idle"?"#000":pdfStatus==="done"?C.green:pdfStatus==="error"?C.coral:C.muted,
      fontWeight:700,fontSize:14,transition:"all 0.3s",
    }}>
      {PDF_BTN_LABELS[pdfStatus]}
    </button>
  );

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:C.bg,minHeight:"100vh",color:C.cream,paddingBottom:60}}>
      <div style={{maxWidth:700,margin:"0 auto",padding:"0 14px"}} ref={topRef}>

        {/* STEP 0: START */}
        {step === 0 && (
          <div style={{paddingTop:40}}>
            <h1 style={{fontFamily:"Georgia,serif",fontSize:32,fontWeight:700,margin:"0 0 8px",textAlign:"center"}}>Team-Reflexion</h1>
            <p style={{color:C.muted,fontSize:13,margin:"0 0 30px",textAlign:"center",lineHeight:1.6}}>Kommunikationsprofil · Vier spezialisierte Instrumente zur Analyse von Teamdynamiken und Kommunikationsmustern</p>

            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px",marginBottom:24}}>
              <div style={{color:C.goldL,fontWeight:700,fontSize:14,marginBottom:14}}>Ihr Name (optional)</div>
              <input
                value={name}
                onChange={e=>setName(e.target.value)}
                placeholder="z.B. Anna Müller"
                style={{width:"100%",padding:"12px 14px",borderRadius:8,background:C.faint,border:`1px solid ${C.border}`,color:C.cream,fontSize:13,outline:"none",marginBottom:20}}
              />

              <div style={{color:C.goldL,fontWeight:700,fontSize:14,marginBottom:14}}>Instrumente</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
                <div style={{background:C.faint,borderRadius:8,padding:"12px",borderLeft:`4px solid ${C.blue}`}}>
                  <div style={{color:C.blue,fontWeight:700,fontSize:11}}>Instrument 1</div>
                  <div style={{color:C.cream,fontSize:12,marginTop:4}}>Team Assessment</div>
                  <div style={{color:C.muted,fontSize:10,marginTop:2}}>15 Fragen · 3-Punkte-Skala</div>
                </div>
                <div style={{background:C.faint,borderRadius:8,padding:"12px",borderLeft:`4px solid ${C.green}`}}>
                  <div style={{color:C.green,fontWeight:700,fontSize:11}}>Instrument 2</div>
                  <div style={{color:C.cream,fontSize:12,marginTop:4}}>Kommunikationsstile</div>
                  <div style={{color:C.muted,fontSize:10,marginTop:2}}>24 Fragen · 5-Punkte-Skala</div>
                </div>
                <div style={{background:C.faint,borderRadius:8,padding:"12px",borderLeft:`4px solid ${C.sky}`}}>
                  <div style={{color:C.sky,fontWeight:700,fontSize:11}}>Instrument 3</div>
                  <div style={{color:C.cream,fontSize:12,marginTop:4}}>Psych. Sicherheit</div>
                  <div style={{color:C.muted,fontSize:10,marginTop:2}}>7 Fragen · 7-Punkte-Skala</div>
                </div>
                <div style={{background:C.faint,borderRadius:8,padding:"12px",borderLeft:`4px solid ${C.lime}`}}>
                  <div style={{color:C.lime,fontWeight:700,fontSize:11}}>Instrument 4</div>
                  <div style={{color:C.cream,fontSize:12,marginTop:4}}>Feedbackorientierung</div>
                  <div style={{color:C.muted,fontSize:10,marginTop:2}}>20 Fragen · 5-Punkte-Skala</div>
                </div>
              </div>

              <div style={{background:C.goldBg,border:`1px solid ${C.gold}44`,borderRadius:8,padding:"12px",marginBottom:20}}>
                <div style={{color:C.goldL,fontWeight:700,fontSize:11}}>⏱ Zeitaufwand</div>
                <p style={{color:C.cream,fontSize:12,margin:"6px 0 0",lineHeight:1.5}}>ca. 10–15 Min. für alle 4 Instrumente (insgesamt 66 Items)</p>
              </div>

              <button
                onClick={()=>go(1)}
                style={{width:"100%",padding:"14px",borderRadius:9,background:`linear-gradient(135deg,${C.gold},${C.goldL})`,color:"#000",fontWeight:700,fontSize:14,border:"none",cursor:"pointer",marginBottom:12}}
              >
                Jetzt starten →
              </button>

              <button
                onClick={()=>setMode("facilitator")}
                style={{width:"100%",padding:"12px",borderRadius:9,background:"transparent",border:`1px solid ${C.border}`,color:C.muted,fontWeight:600,fontSize:12,cursor:"pointer"}}
              >
                Oder: Facilitator-Ansicht öffnen
              </button>
            </div>
          </div>
        )}

        {/* STEP 1: TEAM ASSESSMENT */}
        {step === 1 && (
          <div style={{paddingTop:30}}>
            <ProgressBar step={1}/>
            <SectionHeader badge="Instrument 1 · Team Assessment" title="Team Assessment" sub="15 Fragen zur Teameffektivität · 3-Punkte-Skala" color={C.blue}/>
            <ScaleLegend low="Selten" high="Trifft meist zu" min={1} max={3}/>
            {TA_ITEMS.map((item,idx)=>(
              <LikertItem key={item.id} idx={idx+1} item={item} value={answers[item.id]} onChange={setAns} minVal={1} maxVal={3} reversed={false}/>
            ))}
            <NextBtn ready={allDone(TA_ITEMS)} count={TA_ITEMS.filter(i=>!answers[i.id]).length} onClick={()=>go(2)} label="Weiter zu Kommunikationsstile →" color={C.blue}/>
          </div>
        )}

        {/* STEP 2: KOMMUNIKATIONSSTILE */}
        {step === 2 && (
          <div style={{paddingTop:30}}>
            <ProgressBar step={2}/>
            <SectionHeader badge="Instrument 2 · Kommunikationsstile (CSI-inspiriert)" title="Kommunikationsstile" sub="24 Fragen · 5-Punkte-Skala" color={C.green} original={false}/>
            <p style={{color:C.muted,fontSize:10,marginBottom:14}}>Inspiriert von de Vries et al. (2013)</p>
            <ScaleLegend low="Trifft gar nicht zu" high="Trifft voll zu" min={1} max={5}/>

            {Object.entries(CSI_DIMS).map(([d,{label}]) => {
              const dimItems = CSI_ITEMS.filter(i=>i.d===d);
              return (
                <div key={d} style={{marginBottom:24}}>
                  <div style={{background:C.faint,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",marginBottom:12}}>
                    <div style={{color:CSI_DIMS[d].color,fontWeight:700,fontSize:11}}>{label}</div>
                  </div>
                  {dimItems.map((item,idx)=>(
                    <LikertItem key={item.id} idx={CSI_ITEMS.indexOf(item)+1} item={item} value={answers[item.id]} onChange={setAns} minVal={1} maxVal={5} reversed={false}/>
                  ))}
                </div>
              );
            })}
            <NextBtn ready={allDone(CSI_ITEMS)} count={CSI_ITEMS.filter(i=>!answers[i.id]).length} onClick={()=>go(3)} label="Weiter zu Psych. Sicherheit →" color={C.green}/>
          </div>
        )}

        {/* STEP 3: PSYCHOLOGISCHE SICHERHEIT */}
        {step === 3 && (
          <div style={{paddingTop:30}}>
            <ProgressBar step={3}/>
            <SectionHeader badge="Instrument 3 · Psychologische Sicherheit" title="Psychologische Sicherheit" sub="7 Fragen · 7-Punkte-Skala" color={C.sky} original={true}/>
            <p style={{color:C.muted,fontSize:10,marginBottom:14}}>Original · Frei verfügbar (Edmondson, 1999)</p>
            <ScaleLegend low="Stimme gar nicht zu" high="Stimme voll zu" min={1} max={7}/>
            {PS_ITEMS.map((item,idx)=>(
              <LikertItem key={item.id} idx={idx+1} item={item} value={answers[item.id]} onChange={setAns} minVal={1} maxVal={7} reversed={item.r}/>
            ))}
            <NextBtn ready={allDone(PS_ITEMS)} count={PS_ITEMS.filter(i=>!answers[i.id]).length} onClick={()=>go(4)} label="Weiter zu Feedbackorientierung →" color={C.sky}/>
          </div>
        )}

        {/* STEP 4: FEEDBACKORIENTIERUNG */}
        {step === 4 && (
          <div style={{paddingTop:30}}>
            <ProgressBar step={4}/>
            <SectionHeader badge="Instrument 4 · Feedbackorientierung" title="Feedbackorientierung" sub="20 Fragen · 5-Punkte-Skala" color={C.lime} original={false}/>
            <p style={{color:C.muted,fontSize:10,marginBottom:14}}>Konzeptuell inspiriert von Linderbaum & Levy (2010)</p>
            <ScaleLegend low="Stimme gar nicht zu" high="Stimme voll zu" min={1} max={5}/>

            {Object.entries(FOS_DIMS).map(([s,{label}]) => {
              const subItems = FOS_ITEMS.filter(i=>i.s===s);
              return (
                <div key={s} style={{marginBottom:24}}>
                  <div style={{background:C.faint,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",marginBottom:12}}>
                    <div style={{color:FOS_DIMS[s].color,fontWeight:700,fontSize:11}}>{label}</div>
                  </div>
                  {subItems.map((item,idx)=>(
                    <LikertItem key={item.id} idx={FOS_ITEMS.indexOf(item)+1} item={item} value={answers[item.id]} onChange={setAns} minVal={1} maxVal={5} reversed={false}/>
                  ))}
                </div>
              );
            })}
            <NextBtn ready={allDone(FOS_ITEMS)} count={FOS_ITEMS.filter(i=>!answers[i.id]).length} onClick={()=>go(5)} label="Zu Ergebnissen →" color={C.lime}/>
          </div>
        )}

        {/* STEP 5: RESULTS */}
        {step === 5 && scores && (
          <div style={{paddingTop:30}}>
            <ProgressBar step={5}/>
            <h1 style={{fontFamily:"Georgia,serif",fontSize:26,fontWeight:700,margin:"0 0 8px",textAlign:"center",color:C.goldL}}>Ihre Ergebnisse</h1>
            <p style={{color:C.muted,fontSize:12,margin:"0 0 24px",textAlign:"center"}}>Detaillierte Analyse Ihrer Antworten zu allen 4 Instrumenten</p>

            <ResultsPreview scores={scores}/>

            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 14px",marginTop:24,marginBottom:24}}>
              <PDFButton/>
              <button
                onClick={()=>scoresToCSV(name||"Profil",scores)}
                style={{width:"100%",padding:"14px",borderRadius:9,marginTop:10,background:"transparent",border:`1px solid ${C.border}`,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}
              >
                ⬇ CSV exportieren
              </button>
            </div>

            <button
              onClick={()=>go(0)}
              style={{width:"100%",padding:"12px",borderRadius:9,background:"transparent",border:`1px solid ${C.border}`,color:C.muted,fontWeight:600,fontSize:12,cursor:"pointer"}}
            >
              ← Neues Profil erstellen
            </button>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
